<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#38BDF8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
  </g>

  <!-- Glow effect behind chart -->
  <ellipse cx="850" cy="350" rx="250" ry="200" fill="#38BDF8" opacity="0.04"/>

  <!-- Logo icon (bar chart) -->
  <g transform="translate(80, 160)">
    <rect width="64" height="64" rx="12" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
    <rect x="12" y="36" width="8" height="16" rx="2" fill="url(#accent)"/>
    <rect x="24" y="24" width="8" height="28" rx="2" fill="url(#accent)"/>
    <rect x="36" y="14" width="8" height="38" rx="2" fill="url(#accent)"/>
    <rect x="48" y="28" width="8" height="24" rx="2" fill="url(#accent2)"/>
    <line x1="8" y1="54" x2="58" y2="54" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="160" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">LLMeter</text>

  <!-- Tagline -->
  <text x="82" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94A3B8" font-weight="400">Control your AI spend across all providers.</text>

  <!-- Feature pills -->
  <g transform="translate(82, 320)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="65" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#38BDF8" font-weight="600">OpenAI</text>

    <rect x="145" y="0" width="140" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="215" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#38BDF8" font-weight="600">Anthropic</text>

    <rect x="300" y="0" width="140" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="370" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#38BDF8" font-weight="600">DeepSeek</text>

    <rect x="455" y="0" width="160" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="535" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#38BDF8" font-weight="600">OpenRouter</text>
  </g>

  <!-- Mini chart visualization on the right -->
  <g transform="translate(750, 130)">
    <!-- Chart card -->
    <rect width="370" height="340" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1"/>

    <!-- Card header -->
    <text x="24" y="40" font-family="system-ui, sans-serif" font-size="14" fill="#64748B" font-weight="500">Monthly Cost Breakdown</text>
    <text x="24" y="70" font-family="system-ui, sans-serif" font-size="28" fill="white" font-weight="700">$247.80</text>
    <text x="155" y="70" font-family="system-ui, sans-serif" font-size="14" fill="#22C55E" font-weight="500">-12% vs last month</text>

    <!-- Bar chart -->
    <rect x="24" y="100" width="80" height="180" rx="6" fill="#0F172A"/>
    <rect x="24" y="160" width="80" height="120" rx="6" fill="url(#accent)" opacity="0.8"/>
    <text x="64" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">OpenAI</text>

    <rect x="120" y="100" width="80" height="180" rx="6" fill="#0F172A"/>
    <rect x="120" y="200" width="80" height="80" rx="6" fill="url(#accent)" opacity="0.6"/>
    <text x="160" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Anthropic</text>

    <rect x="216" y="100" width="80" height="180" rx="6" fill="#0F172A"/>
    <rect x="216" y="240" width="80" height="40" rx="6" fill="url(#accent2)" opacity="0.7"/>
    <text x="256" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">DeepSeek</text>

    <rect x="312" y="100" width="34" height="180" rx="6" fill="#0F172A"/>
    <rect x="312" y="220" width="34" height="60" rx="6" fill="url(#accent2)" opacity="0.5"/>
    <text x="329" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">OR</text>
  </g>

  <!-- Open source badge -->
  <g transform="translate(82, 410)">
    <rect width="200" height="36" rx="18" fill="#22C55E" opacity="0.15"/>
    <text x="100" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#22C55E" font-weight="600">Open Source (AGPL-3.0)</text>
  </g>

  <!-- Footer -->
  <text x="82" y="560" font-family="system-ui, sans-serif" font-size="16" fill="#475569">github.com/amedinat/LLMeter</text>
  <text x="82" y="585" font-family="system-ui, sans-serif" font-size="14" fill="#334155">by Simplifai</text>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
